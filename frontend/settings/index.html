<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayClip Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Temperature -->
        <div class="input-group slider-group">
            <label for="temperature">Temperature</label>
            <span id="temperatureValue" class="temperature-value">0.0</span>
            <input type="range" id="temperature" class="slider-input" step="0.1" min="0" max="1" value="0">
        </div>

        <!-- Model -->
        <div class="input-group model-group">
            <label for="model">Model</label>
            <input type="text" id="model" class="rounded-input" placeholder="gpt-4o">
        </div>

        <!-- Prompt -->
        <div class="input-group column">
            <label for="initialPrompt">Initial prompt</label>
            <textarea id="initialPrompt" class="rounded-input prompt-area" placeholder="Enter system instructions..."></textarea>
        </div>

        <!-- Actions -->
        <div class="actions">
            <button id="saveBtn" class="btn">Save Settings</button>
            <div class="separator"></div>
            <button id="resetBtn" class="btn reset-btn">Reset to Default</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
